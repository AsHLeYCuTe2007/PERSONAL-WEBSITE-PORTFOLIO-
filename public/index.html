<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURAPIKA</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #ff0000;
            --gold: #ffcc00;
            --bg: #05070a; 
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 204, 0, 0.15);
        }

        /* Inalis ang sky blue highlight sa click */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body { background-color: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 60px; cursor: pointer; }
        
        .glow {
            position: fixed; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(204, 0, 0, 0.1) 0%, transparent 70%);
            z-index: -1; filter: blur(60px);
        }

        .hero { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .cover-area {
            width: 100%; 
            height: 180px; 
            background: linear-gradient(to bottom, transparent, var(--bg)), url('https://i.gifer.com/CnZY.gif');
            background-size: cover; background-position: center;
            border-bottom: 2px solid var(--accent);
        }

        .profile-container {
            margin-top: -60px; text-align: center; z-index: 10;
        }

        .profile-hex {
            width: 120px; height: 120px; 
            padding: 4px; background: var(--bg);
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            border: 2px solid var(--gold);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .profile-hex img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .name-wrapper {
            margin-top: 15px; display: flex; gap: 3px; justify-content: center;
            font-family: 'Syncopate', sans-serif;
        }

        .wave-letter {
            font-size: 1.8rem;
            font-weight: 700; color: var(--gold);
            text-transform: uppercase; display: inline-block;
            animation: moveWave 2.5s ease-in-out infinite;
            animation-delay: calc(0.15s * var(--i));
        }

        @keyframes moveWave {
            0%, 100% { transform: translateY(0); color: var(--gold); }
            50% { transform: translateY(-10px); color: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        }

        .tagline { text-align: center; color: var(--gold); opacity: 0.5; letter-spacing: 4px; font-size: 0.6rem; margin-top: 5px; text-transform: uppercase; }

        section { padding: 40px 10% 10px; max-width: 1100px; margin: 0 auto; }

        .section-header {
            font-family: 'Syncopate', sans-serif; font-size: 0.8rem;
            color: var(--gold); margin-bottom: 25px; display: flex; align-items: center; gap: 10px;
            opacity: 0.8;
        }
        .section-header::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--gold), transparent); opacity: 0.2; }

        .stack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }

        .stack-item {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 8px; text-align: center;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(5px);
        }

        .stack-item:hover { border-color: var(--accent); background: rgba(255, 0, 0, 0.05); transform: translateY(-8px); }

        .stack-item i { font-size: 1.5rem; color: var(--accent); margin-bottom: 8px; display: block; }
        .stack-item span { font-size: 0.7rem; font-weight: 700; color: #ccc; }

        .mission-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        
        .mission-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 25px 15px; border-radius: 10px; text-decoration: none;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .mission-card:hover { border-color: var(--gold); background: rgba(255, 255, 255, 0.04); transform: translateY(-8px); }
        .mission-card i { font-size: 1.8rem; color: var(--gold); margin-bottom: 12px; }
        .mission-card h3 { font-family: 'Syncopate', sans-serif; font-size: 0.7rem; color: #fff; letter-spacing: 1px; }

        .mission-card.fb:hover i { color: #1877f2; }
        .mission-card.dc:hover i { color: #5865f2; }

        .g1 { top: -50px; right: -50px; }
    </style>
</head>
<body onclick="playMusic()" onscroll="playMusic()">

    <div class="glow g1"></div>

    <audio id="bgMusic" loop>
        <source src="kurapika.mp3" type="audio/mpeg">
    </audio>

    <header class="hero">
        <div class="cover-area"></div>
        <div class="profile-container">
            <div class="profile-hex">
                <img src="https://i.gifer.com/94k1.gif" alt="Kurapika Profile">
            </div>
            <div class="name-wrapper">
                <span class="wave-letter" style="--i:1">K</span>
                <span class="wave-letter" style="--i:2">U</span>
                <span class="wave-letter" style="--i:3">R</span>
                <span class="wave-letter" style="--i:4">A</span>
                <span class="wave-letter" style="--i:5">P</span>
                <span class="wave-letter" style="--i:6">I</span>
                <span class="wave-letter" style="--i:7">K</span>
                <span class="wave-letter" style="--i:8">A</span>
            </div>
            <p class="tagline">GØDZ-MØDZ - UGK • Fullstack Dev</p>
        </div>
    </header>

    <section id="stack">
        <div class="section-header">SKILL_SET</div>
        <div class="stack-grid">
            <div class="stack-item"><i class="fab fa-js"></i><span>JAVASCRIPT</span></div>
            <div class="stack-item"><i class="fab fa-python"></i><span>PYTHON</span></div>
            <div class="stack-item"><i class="fab fa-node-js"></i><span>NODE.JS</span></div>
            <div class="stack-item"><i class="fas fa-database"></i><span>SQL DB</span></div>
            <div class="stack-item"><i class="fab fa-html5"></i><span>HTML5</span></div>
            <div class="stack-item"><i class="fab fa-css3-alt"></i><span>CSS3</span></div>
        </div>
    </section>

    <section id="missions">
        <div class="section-header">PROJECTS</div>
        <div class="mission-grid">
            <a href="https://autobot-2026-8ba9.onrender.com" class="mission-card" target="_blank">
                <i class="fas fa-robot"></i>
                <h3>AUTOBOT</h3>
            </a>
            <a href="https://vern-rest-api.vercel.app/docs" class="mission-card" target="_blank">
                <i class="fas fa-fire-alt"></i>
                <h3>AUTO SHARE</h3>
            </a>
        </div>
    </section>

    <section id="socials">
        <div class="section-header">CONNECT</div>
        <div class="mission-grid">
            <a href="https://www.facebook.com/61585003982217" class="mission-card fb" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <h3>FACEBOOK</h3>
            </a>
            <a href="https://discord.com/users/JzSanji" class="mission-card dc" target="_blank">
                <i class="fab fa-discord"></i>
                <h3>DISCORD</h3>
            </a>
        </div>
    </section>

    <script>
        const music = document.getElementById('bgMusic');
        let isStarted = false;

        function playMusic() {
            if (!isStarted) {
                music.play().then(() => {
                    isStarted = true;
                }).catch(e => {});
            }
        }
    </script>

</body>
</html>
