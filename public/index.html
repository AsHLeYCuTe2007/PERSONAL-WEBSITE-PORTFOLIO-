<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLARK PERSONAL PORTFOLIO</title>
    <style>
        :root {
            --matrix-green: #00FF41; 
            --neon-cyan: #00FFFF;
            --bg-color: #050505;
            --panel-bg: rgba(10, 15, 10, 0.95);
            --text-color: #E0FFE0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas#matrix {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 650px;
            background: var(--panel-bg);
            border: 1px solid var(--matrix-green);
            padding: 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .corner {
            position: absolute;
            width: 15px; height: 15px;
            border: 2px solid var(--matrix-green);
            transition: 0.3s;
        }
        .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #003B00;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--matrix-green);
            font-weight: bold;
        }

        .blink-dot {
            width: 10px; height: 10px;
            background: var(--matrix-green);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .menu-trigger {
            background: transparent;
            color: var(--matrix-green);
            border: 1px solid var(--matrix-green);
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .menu-trigger:hover {
            background: var(--matrix-green);
            color: #000;
            box-shadow: 0 0 20px var(--matrix-green);
        }

        .profile-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-frame {
            width: 150px; 
            height: 150px;
            padding: 5px;
            border: 2px solid var(--matrix-green);
            margin-bottom: 20px;
            background: #000;
            position: relative;
        }
        
        .avatar-frame::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 1px dashed var(--matrix-green);
            z-index: -1;
            animation: rotate 10s linear infinite;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: none; 
        }

        .hacker-name {
            font-size: 2.2rem;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--matrix-green);
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .terminal-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-left: 4px solid var(--matrix-green);
            padding: 15px;
            text-align: left;
            min-height: 70px;
            font-size: 0.95rem;
            color: #ccc;
        }

        .side-panel {
            position: fixed;
            top: 0; 
            right: -350px;
            width: 320px; 
            height: 100%;
            background: #020202;
            border-left: 2px solid var(--matrix-green);
            z-index: 100;
            padding: 30px;
            transition: right 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: -10px 0 60px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .side-panel.active {
            right: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .panel-title {
            color: var(--matrix-green);
            letter-spacing: 3px;
            text-shadow: 0 0 5px var(--matrix-green);
        }

        .close-icon {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            width: 35px; height: 35px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .close-icon:hover {
            background: #fff;
            color: #000;
            transform: rotate(90deg);
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            opacity: 0;
            transform: translateX(30px);
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .side-panel.active .nav-links li {
            animation: slideInFade 0.5s forwards ease-out;
        }

        
        .side-panel.active .nav-links li:nth-child(1) { animation-delay: 0.1s; }
        .side-panel.active .nav-links li:nth-child(2) { animation-delay: 0.2s; }
        .side-panel.active .nav-links li:nth-child(3) { animation-delay: 0.3s; }
        .side-panel.active .nav-links li:nth-child(4) { animation-delay: 0.4s; }
        .side-panel.active .nav-links li:nth-child(5) { animation-delay: 0.5s; }
        .side-panel.active .nav-links li:nth-child(6) { animation-delay: 0.6s; } 

        .nav-links a {
            display: flex;
            align-items: center;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 10px;
            border: 1px solid transparent;
            transition: all 0.3s;
            color: #fff;
            animation: neonPulse 3s infinite alternate;
        }

        .nav-links a:hover {
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
            padding-left: 25px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            animation: none;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 90;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .chat-bubble {
            position: fixed;
            bottom: 25px; right: 25px;
            width: 60px; height: 60px;
            background: #000;
            border: 2px solid var(--matrix-green);
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            cursor: pointer;
            z-index: 80;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--matrix-green);
        }

        .chat-bubble:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        .chat-bubble img {
            width: 30px;
            filter: brightness(0) saturate(100%) invert(48%) sepia(79%) saturate(2476%) hue-rotate(86deg) brightness(118%) contrast(119%);
        }

        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.2; } 
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideInFade {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes neonPulse {
            0% {
                color: #fff;
                text-shadow: 0 0 2px #fff;
            }
            50% {
                color: #e0ffe0;
                text-shadow: 0 0 5px var(--matrix-green);
            }
            100% {
                color: var(--neon-cyan);
                text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            }
        }

        @media (max-width: 600px) {
            .container { width: 95%; padding: 20px; }
            .hacker-name { font-size: 1.8rem; }
            .side-panel { width: 85%; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <audio id="bg-music" loop>
        <source src="kurapika.mp3" type="audio/mp3">
    </audio>

    <div class="overlay" id="overlay"></div>

    <div class="container">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="header">
            <div class="status-indicator">
                <div class="blink-dot"></div>
                <span>SYSTEM ID: K-404</span>
            </div>
            <button class="menu-trigger" id="btn-open">ACCESS MENU</button>
        </div>

        <div class="profile-area">
            <div class="avatar-frame">
                <img src="kurapika.png" alt="Profile" class="avatar">
            </div>
            
            <h1 class="hacker-name">CLARK</h1>

            <div class="terminal-box">
                <span style="color:var(--neon-cyan)">ABOUT ME</span> 
                <span id="typewriter"></span><span style="animation:blink 0.8s infinite; color: var(--matrix-green);">█</span>
            </div>
        </div>
    </div>

    <div class="side-panel" id="side-panel">
        <div class="panel-header">
            <h3 class="panel-title">// SYSTEM TOOLS</h3>
            <button class="close-icon" id="btn-close">X</button>
        </div>
        <ul class="nav-links">
            <li><a href="https://natzh-spam-share-v1.onrender.com/" target="_blank">01 :: Spam Share Tool</a></li>
            <li><a href="https://vd-777-website-banner.onrender.com" target="_blank">02 :: Website Banner</a></li>
            <li><a href="https://www.facebook.com/profile.php?id=61583871487100" target="_blank">03 :: Facebook</a></li>
            <li><a href="https://www.facebook.com/profile.php?id=61582720567876" target="_blank">04 :: Dream Girl</a></li>
            <li><a href="https://github.com/ZarkDev098" target="_blank">05 :: GitHub</a></li>
            <li><a href="https://www.instagram.com/urbf_fk" target="_blank">06 :: Instagram</a></li>
        </ul>
    </div>

    <div class="chat-bubble" id="chat-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" alt="Chat">
    </div>

    <script>
        
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        let drops = []; 
        const fontSize = 14;
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'; 

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const columns = canvas.width / fontSize;
            drops = Array(Math.floor(columns)).fill(1);
        }

        
        initMatrix();

        
        window.addEventListener('resize', initMatrix);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        
        const btnOpen = document.getElementById('btn-open');
        const btnClose = document.getElementById('btn-close');
        const sidePanel = document.getElementById('side-panel');
        const overlay = document.getElementById('overlay');

        function toggleMenu(state) {
            if (state) {
                sidePanel.classList.add('active');
                overlay.classList.add('active');
            } else {
                sidePanel.classList.remove('active');
                overlay.classList.remove('active');
            }
        }

        btnOpen.addEventListener('click', () => toggleMenu(true));
        btnClose.addEventListener('click', () => toggleMenu(false));
        overlay.addEventListener('click', () => toggleMenu(false));

        
        const texts = [
            "HI MY NAME IS CLARK FROM LONDON U.K",
            "I'M INFORMATION TECHNOLOGY STUDENT-2021",
            "MY BDAY MAY 15, 2008",
            "THANKS FOR VISIT MY PERSONAL WEBSITE",
        ];
        let count = 0;
        let index = 0;
        let currentText = '';
        let letter = '';

        (function type() {
            if (count === texts.length) count = 0;
            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById('typewriter').textContent = letter;

            if (letter.length === currentText.length) {
                count++;
                index = 0;
                setTimeout(type, 2000);
            } else {
                setTimeout(type, 80);
            }
        }());

        
        document.getElementById('chat-btn').addEventListener('click', () => {
            window.open('https://m.me/61583871487100', '_blank');
        });
        
        
        document.body.addEventListener('click', () => {
            document.getElementById('bg-music').play().catch((e) => {
                console.log("Audio play failed (user might need to interact more): ", e);
            });
        }, { once: true });

    </script>
</body>
</html>
